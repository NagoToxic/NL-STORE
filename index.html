<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NL STORE</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0a0a, #1a0033);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #a855f7, #7a00ff);
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 15px 30px;
      border-radius: 30px;
      background: linear-gradient(90deg, #7a00ff, #a855f7);
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #a855f7;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>NL STORE</h1>
    <p>Estamos preparando uma experiência digital premium 🚀</p>
    <p>Produtos digitais, contas premium e muito mais.</p>

    <a href="#" class="btn">Em breve</a>

    <div class="footer">
      suporte.nlstore@gmail.com
    </div>
  </div>

</body>
</html>
